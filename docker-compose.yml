services:
  app:
    build: .
    image: budget-automation:latest
    ports:
      - "3001:3001"
    volumes:
      - ./database:/app/database
      - ./data/uploads:/app/data/uploads
    environment:
      PORT: 3001
      DATABASE_PATH: /app/database/budget_automation.db
      UPLOAD_PATH: /app/data/uploads
      FRONTEND_DIST_PATH: /app/frontend/dist
      NODE_ENV: production
      # GigaChat — задать на сервере в .env рядом с docker-compose.yml
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      # Список моделей для PDF/вложений (через запятую). Пусто = GigaChat-2-Lite,GigaChat-2-Pro,GigaChat-2-Max
      GIGACHAT_MODELS_FILES: ${GIGACHAT_MODELS_FILES:-}
      # OpenRouter — для Gemini Flash matching (фаза 8.1)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ENABLE_OPENROUTER_LLM_MATCHING: ${ENABLE_OPENROUTER_LLM_MATCHING:-false}
      # API auth (SEC-1) — задать API_SECRET в .env рядом с docker-compose.yml, чтобы закрыть /api.
      API_SECRET: ${API_SECRET:-}
      # Telegram-уведомления о замечаниях (F3) — задать токен + chat_id (+опц. APP_BASE_URL), чтобы включить.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    restart: unless-stopped
