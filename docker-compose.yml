services:
  app:
    image: ghcr.io/aleks13620-cpu/budget-automation:latest
    ports:
      - "3001:3001"
    volumes:
      - ./database:/app/database
      - ./data/uploads:/app/data/uploads
    environment:
      PORT: 3001
      DATABASE_PATH: /app/database/budget_automation.db
      UPLOAD_PATH: /app/data/uploads
      FRONTEND_DIST_PATH: /app/frontend/dist
      NODE_ENV: production
      # GigaChat — задать на сервере в .env рядом с docker-compose.yml
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      # Список моделей для PDF/вложений (через запятую). Пусто = GigaChat-2-Lite,GigaChat-2-Pro,GigaChat-2-Max
      GIGACHAT_MODELS_FILES: ${GIGACHAT_MODELS_FILES:-}
    restart: unless-stopped
