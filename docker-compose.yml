services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./database:/app/database
      - ./data/uploads:/app/data/uploads
    environment:
      PORT: 3001
      DATABASE_PATH: /app/database/budget_automation.db
      UPLOAD_PATH: /app/data/uploads
      FRONTEND_DIST_PATH: /app/frontend/dist
      NODE_ENV: production
    restart: unless-stopped
