name: Plan guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  plans-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run strict plan guard
        working-directory: backend
        run: npm run plans:check:strict
