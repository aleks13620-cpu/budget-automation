name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d ' \n\r' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 5.42.103.63 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@5.42.103.63 << 'ENDSSH'
            set -e
            REPO_DIR=/root/budget-automation
            REPO_URL=https://github.com/aleks13620-cpu/budget-automation.git

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Git repo not found — cloning..."
              rm -rf "$REPO_DIR/backend" "$REPO_DIR/frontend" "$REPO_DIR/Dockerfile"
              git clone "$REPO_URL" /tmp/budget-repo
              cp -r /tmp/budget-repo/.git "$REPO_DIR/.git"
              rm -rf /tmp/budget-repo
              cd "$REPO_DIR"
              git checkout -- .
            else
              cd "$REPO_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            docker compose build --no-cache
            docker compose up -d --force-recreate
          ENDSSH
