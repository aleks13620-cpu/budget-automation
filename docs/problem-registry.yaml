      "next_action": "Реализовать Вариант 1 (точечная правка linkPdfParentChildren + регрессионный набор). Контекст: docs/plans/references/2026-05-12_pdf_spec_parent_child_followups.md и retrospectives/12.05.26_pdf-позиции-экспертное-заключение.md (источник Вариантов 1/2/3). Связанный локальный Cursor-план: pdf_spec_variant-children_fix_22290548 (хранится в .cursor/plans/ на машине автора, не в репо).",
